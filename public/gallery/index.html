<article>
    <header id="post-header">
        <h1></h1>
        <div></div>
    </header><div class="gallery">
    <button class="prev-btn" onclick="prevImage()">&#10094;</button>
    <div class="image-container">
        <img id="gallery-image" src="/images/imagen1.jpg" alt="Galería">
    </div>
    <button class="next-btn" onclick="nextImage()">&#10095;</button>
</div>

<script>
    const images = [
      "/images/imagen1.jpg",
      "/images/imagen2.jpg",
      "/images/imagen3.jpg",
      "/images/imagen4.jpg",
      "/images/imagen5.jpg",
      "/images/imagen6.jpg",
      "/images/imagen7.jpg",
      "/images/imagen8.jpg",
      "/images/imagen9.jpg",
      "/images/imagen10.jpg",
      "/images/imagen11.jpg",
      "/images/imagen12.jpg",
      "/images/imagen13.jpg",
      "/images/imagen14.jpg"
    ];
    let currentIndex = 0;
    const imgElement = document.getElementById("gallery-image");

    function nextImage() {
        currentIndex = (currentIndex + 1) % images.length;
        imgElement.src = images[currentIndex];
    }

    function prevImage() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        imgElement.src = images[currentIndex];
    }
</script>

<style>
    .gallery {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        width: 100%;
        max-width: 600px;  
        margin: auto;  
    }

    .image-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;  
    }

    .gallery img {
        max-width: 100%;
        max-height: 100%;  
        height: auto;
        width: auto;
        border-radius: 10px;
        box-shadow: none;  
        display: block;
        margin: auto;  
    }

    .prev-btn, .next-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 40px;
        cursor: pointer;
        color: black;
    }

    .prev-btn {
        left: -75px;  
    }

    .next-btn {
        right: -50px;  
    }

    .prev-btn:hover, .next-btn:hover {
        color: gray;
    }
</style>

<p>click <a href="https://drive.google.com/drive/folders/1yQVprXEQsCu9GsWy2QU87wC01Hgy9Hqw?usp=sharing">here</a> for more.</p>
